<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡數位時鐘 - 黑色哲學版</title>
    <style>
        /* 設定深色背景與字體 */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', 'Courier New', monospace;
            color: #ffffff;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
        }

        /* 日期樣式 */
        #date {
            font-size: 1.2rem;
            color: #555555;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        /* 時鐘本體樣式 */
        #clock {
            font-size: 8rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        /* 金句樣式 */
        #quote {
            font-size: 1.1rem;
            color: #888888;
            min-height: 1.5rem;
            letter-spacing: 3px;
            transition: opacity 0.8s ease-in-out; /* 增加淡入淡出效果 */
            opacity: 1;
        }

        /* 手機版縮放 */
        @media (max-width: 600px) {
            #clock { font-size: 4rem; }
            #date { font-size: 1rem; }
            #quote { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="date">YYYY / MM / DD</div>
        <div id="clock">00:00:00</div>
        <div id="quote">載入中...</div>
    </div>
